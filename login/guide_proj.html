<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracking - PROJX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(90deg, #2e1f47, #c64c4c);
            min-height: 100vh;
        }

        .main-content {
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-text h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header-text p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(88, 70, 150, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(120, 100, 180, 0.3);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-value {
            color: white;
            font-size: 36px;
            font-weight: bold;
        }

        .stat-value.active { color: #5dade2; }
        .stat-value.progress { color: #f39c12; }
        .stat-value.completed { color: #2ecc71; }

        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            background: rgba(88, 70, 150, 0.3);
            border: 1px solid rgba(120, 100, 180, 0.4);
            border-radius: 8px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .status-filter {
            display: flex;
            gap: 10px;
            background: rgba(88, 70, 150, 0.3);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid rgba(120, 100, 180, 0.4);
        }

        .status-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .status-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .status-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: rgba(88, 70, 150, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(120, 100, 180, 0.3);
            transition: all 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .project-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .project-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .student-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 15px;
        }

        .project-badges {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.status-planning {
            background: #9b59b6;
            color: white;
        }

        .badge.status-progress {
            background: #5dade2;
            color: white;
        }

        .badge.status-testing {
            background: #f39c12;
            color: white;
        }

        .badge.status-completed {
            background: #2ecc71;
            color: white;
        }

        .badge.status-hold {
            background: #e74c3c;
            color: white;
        }

        .update-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .update-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .update-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
        }

        .update-display {
            background: rgba(88, 70, 150, 0.3);
            padding: 12px;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px solid rgba(120, 100, 180, 0.4);
        }

        .no-update {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        .evaluation-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(120, 100, 180, 0.3);
        }

        .eval-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .eval-input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(120, 100, 180, 0.4);
            border-radius: 6px;
            background: rgba(88, 70, 150, 0.3);
            color: white;
            font-size: 13px;
            margin-bottom: 10px;
            resize: vertical;
            min-height: 60px;
        }

        .eval-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .eval-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .progress-input {
            width: 100px;
            padding: 8px;
            border: 1px solid rgba(120, 100, 180, 0.4);
            border-radius: 6px;
            background: rgba(88, 70, 150, 0.3);
            color: white;
            font-size: 12px;
        }

        .set-progress-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .set-progress-btn:hover {
            background: #27ae60;
            transform: scale(1.05);
        }

        .last-eval-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            background: rgba(46, 204, 113, 0.2);
            border-radius: 4px;
            border-left: 3px solid #2ecc71;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5dade2, #2ecc71);
            border-radius: 4px;
            transition: width 0.5s;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .delete-btn {
            background: rgba(244, 67, 54, 0.8);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: rgba(244, 67, 54, 1);
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 60px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="header">
            <div class="header-text">
                <h1>Guide Project Management</h1>
                <p>Manage project progress, evaluations, and student assignments</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Projects</div>
                <div class="stat-value" id="totalProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active</div>
                <div class="stat-value active" id="activeProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">In Progress</div>
                <div class="stat-value progress" id="progressProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Completed</div>
                <div class="stat-value completed" id="completedProjects">0</div>
            </div>
        </div>

        <div class="search-filter">
            <input type="text" class="search-box" placeholder="Search projects..." id="searchInput">
            <div class="status-filter">
                <button class="status-btn active" data-status="All">All</button>
                <button class="status-btn" data-status="Planning">Planning</button>
                <button class="status-btn" data-status="In Progress">In Progress</button>
                <button class="status-btn" data-status="Testing">Testing</button>
                <button class="status-btn" data-status="Completed">Completed</button>
                <button class="status-btn" data-status="On Hold">On Hold</button>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <script src="guide_proj.js"></script>
</body>
</html>
