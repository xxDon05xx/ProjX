<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJX Guide Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg1:#2e1f47; --bg2:#c64c4c;
    --card: rgba(0,0,0,0.25); --muted: rgba(255,255,255,0.12);
    --text:#fff; --accent:#ffcc00; --ok:#4caf50; --danger:#ff4d4d;
  }
  body {
    font-family: 'Poppins', sans-serif;
    display:flex; min-height:100vh; color:var(--text);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
  }
  /*Sidebar*/
  .sidebar h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 1.5em;
      color: #ffffff;
    }
    .sidebar button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background-color: rgba(128, 134, 139, 0.4);
      color: rgb(255, 255, 255); /* Explicitly set text color to white */
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      font-size: 1em;
      transition: background-color 0.3s ease, transform 0.3s ease, opacity 0.3s ease; /* Added opacity transition */
    }
    .sidebar button:hover {
      transform: scale(1.05);
    }
    .sidebar button:last-child {
      margin-bottom: 0; /* Remove margin from last button */
    }
    .content {
      margin-left: 20px;
      padding: 20px;
      box-sizing: border-box;
    }
  .sidebar {
    width: 240px; padding: 22px;
    background: linear-gradient(180deg, #26183e, #3c2a63);
    box-shadow: 2px 0 8px rgba(0,0,0,0.35);
  }
  .sidebar h2 { text-align:center; margin-bottom:26px; letter-spacing:.5px; }

  /* Main */
  .main { flex:1; padding:22px; display:flex; flex-direction:column; gap:20px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .topbar h1 { font-size:26px; font-weight:700; }

  .content { display:grid; grid-template-columns: 2fr 1fr; gap:20px; }

  /* Cards */
  .card {
    background: var(--card); padding:18px; border-radius:14px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25); backdrop-filter: blur(6px);
    margin-bottom:20px;
  }
  .card h2 { margin-bottom:12px; font-size:18px; }

  /* Lists & items */
  .projects-list, .announcements-list, .notes-list, .todos-list { display:grid; gap:10px; margin-top:12px; }
  .project-item, .announcement-item, .note-item, .todo-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px; border-radius:10px; background:rgba(255,255,255,0.10);
  }
  .pill { padding:4px 8px; border-radius:999px; font-size:12px; background:rgba(0,0,0,0.35); }

  /* Todo specific */
  .todo-item {
    display:flex;
    align-items:center;
    gap:10px;
  }
  .todo-checkbox {
    width:18px;
    height:18px;
    cursor:pointer;
  }
  .todo-text {
    flex:1;
  }
  .todo-text.completed {
    text-decoration: line-through;
    opacity: 0.6;
  }

  /* Forms */
  .announcement-form, .note-form, .todo-form { display:flex; gap:8px; }
  .announcement-form input, .note-form input, .todo-form input,#projectForm input{
    flex:1; padding:8px; border:none; border-radius:8px; background:rgba(255,255,255,0.12); color:#fff;
  }
  .announcement-form button, .note-form button, .todo-form button,#projectForm button {
    padding:8px 10px; border:none; border-radius:8px; background:#ffcc00; color:#111; font-weight:700; cursor:pointer;
  }
 
  /* Close Button */
  .close-btn {
    margin-left:10px;
    background: var(--danger);
    border:none;
    color:#fff;
    font-size:14px;
    border-radius:50%;
    width:22px; height:22px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  

  /* Stats */
  .stats { display:flex; gap:15px;margin-bottom:10px; }
  .stat-card { flex:1; text-align:center; padding:16px; border-radius:12px; background:rgba(255,255,255,0.12); }
  .stat-card h3 { font-size:22px; margin-bottom:6px; }
</style>
</head>
<body>
    <aside class="sidebar">
      <h2>PROJX</h2>
      <button id="dashboardBtn">Dashboard</button>
    <button id="projectsBtn">Projects</button>
    <button id="logBtn">Logout</button>
    </aside>

  <main class="main">
    <div class="topbar">
      <h1>WELCOME, Guide</h1>
    </div>

    <section class="content">
      <div class="left">
        <!-- Stats -->
        <div class="stats">
          <div class="stat-card">
            <h3 id="statOngoing">0</h3>
            <p>Ongoing Projects</p>
          </div>
          <div class="stat-card">
            <h3 id="statCompleted">0</h3>
            <p>Completed</p>
          </div>
          <div class="stat-card">
            <h3 id="statPending">0</h3>
            <p>Pending</p>
          </div>
        </div>

        <!-- Projects -->
        <div class="card">
          <h2>Projects</h2>
          <form id="projectForm" class="row">
            <input type="text" id="projectName" placeholder="Search project by name">
            <button type="button" onclick="searchProject()">Search</button>
          </form>
          <div id="projectsList" class="projects-list"></div>
        </div>

        <!-- Announcements -->
        <div class="card">
          <h2>Announcements</h2>
          <form class="announcement-form" onsubmit="addAnnouncement(event)">
            <input type="text" id="announcementInput" placeholder="Type announcement">
            <button type="submit">Post</button>
          </form>
          <div id="announcementsList" class="announcements-list"></div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="right">
        <!-- Todos -->
        <div class="card">
          <h2>My Todos</h2>
          <form class="todo-form" onsubmit="addTodo(event)">
            <input type="text" id="todoInput" placeholder="Add a new task...">
            <button type="submit">Add</button>
          </form>
          <div id="todosList" class="todos-list"></div>
        </div>

        <!-- Notes & Ideas -->
        <!-- <div class="card">
          <h2>Notes & Ideas</h2>
          <form class="note-form" onsubmit="addNote(event)">
            <input type="text" id="noteInput" placeholder="Write a quick note...">
            <button type="submit">Add</button>
          </form>
          <div id="notesList" class="notes-list"></div>
        </div> -->
      </div>
    </section>
  </main>

  <script src="guideDash.js"></script>

</body>
</html>
